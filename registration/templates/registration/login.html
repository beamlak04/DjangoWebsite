<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="" href="">

    <!-- mdb -->
    <link rel="stylesheet" href="{% static 'mdb/css/mdb.min.css'%}">
    <!-- bootstrap  -->
    <link rel="stylesheet" href="{% static 'bootstrap/dist/css/bootstrap.min.css'%}">
    
    <!-- custom bootstrap -->
    <link rel="stylesheet" href="{% static 'custom-bootstrap/css/main.min.css'%}">
    
    <!-- core css  -->
    <link rel="stylesheet" href="{% static 'core-styles/landing_pg/style.css'%}">
    <!-- Custom css -->
    <link rel="stylesheet" href="{% static 'styles/main/style.css'%}">
    
    <!-- font awesome   -->
    <link rel="stylesheet" href="{% static 'font-awesome/css/all.min.css'%}">
    <!-- bootstrap icons -->
    <link rel="stylesheet" href="{% static 'icons/bootstrap-icons/font/bootstrap-icons.css'%}">

    <script src="{% static 'mdb/js/mdb.min.js'%}"></script>
    <script src="{% static 'bootstrap/dist/js/bootstrap.bundle.min.js'%}"></script>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
    
    <div class="d-none d-md-block position-absolute top-0 start-0 ps-5" >
        <a href="{% url 'Home'%}">
            <!-- <img src="{% static 'font-awesome/svgs/solid/house.svg'%}" alt="" width="50" height="50"> -->
            
            <p><i class="fa-solid fa-house"></i> Back to Home</p>
        </a>
    </div>
    
    <form action="" method="post" class="log-form border rounded bg-light pt-4">
        <div class="container">
            <div class="container-fluid bg-secondary py-1 rounded mb-3">
                <h2 class="display-6 fw-normal text-center text-white">Sign in</h2>
            </div>
            <div class="mb-3">
                <label for="userSignInEmail" class="form-label">Email</label>
                <input type="email" placeholder="Email" class="form-control" aria-describedby="userSignInEmail">
            </div>
            <div class="mb-5">
                <label for="userSignInPass" class="form-label">Password</label>
                <input type="password" placeholder="Password" class="form-control" aria-describedby="userSignInPass">
            </div>
            <div class="mb-3 text-center">
                <button class="btn btn-secondary rounded-pill w-100" type="submit">Login</button>
                <p>Don't have an account? <a href="{% url 'register_pg'%}" class="text-secondary text-center">Sign up</a></p>
            </div>
        </div>
    </form>

</div>

</body>

</html>
