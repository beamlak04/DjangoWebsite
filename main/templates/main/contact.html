{% extends 'main/index.html'%}
{% load static %}

{% block slider %}
<!-- hero section -->
<div class="carousel">
    <div class="carousel-inner">

        <div class="carousel-item bg-image bg d-flex align-items-center justify-content-center">
            <img src="{% static 'images/images2.png'%}" alt="" class="w-100">
            <div class="mask" style="background-color: rgba(0,0,0,0.6);"></div>
            <div class="carousel-caption d-block text-white bg-text">
                <h2 class="display-3 fw-semibold ">Contact Us</h2>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
<section>
    <div class="container-fluid">
        <div class="row welcome">
            <div class="col-lg-6">
                <div class="container-fluid mb-5">
                    <h2 class="display-5 fw-normal text-center">Contact Info</h2>
                </div>
                <!-- phone info -->
                <div class="container mb-3">
                    <div class="row">
                        <div class="col-4 d-flex align-items-top justify-content-center">
                            <img src="{% static 'font-awesome/svgs/solid/mobile-screen.svg'%}" width="50" height="50" alt="">
                        </div>
                        <div class="col-8">
                            <h3 class="fw-normal">Phone</h3>
                            <p class="">+251-113-210-831</p>
                            <p class="">+251-113-214-715</p>
                        </div>
                    </div>
                </div>
                <!-- email info -->
                <div class="container mb-3">
                    <div class="row">
                        <div class="col-4 d-flex align-items-top justify-content-center">
                            <img src="{% static 'font-awesome/svgs/solid/envelope.svg'%}" width="50" height="50" alt="">
                        </div>
                        <div class="col-8">
                            <h3 class="fw-normal">Email</h3>
                            <p class="">dbms@ethionet.et</p>
                        </div>
                    </div>
                </div>
                <!-- location info -->
                <div class="container mb-3">
                    <div class="row">
                        <div class="col-4 d-flex align-items-top justify-content-center">
                            <img src="{% static 'icons/bootstrap-icons/icons/geo-alt-fill.svg'%}" width="50" height="50" alt="">
                        </div>
                        <div class="col-8">
                            <h3 class="fw-normal">Location</h3>
                            <p class="">Mekanissa, Addis Ababa, Ethiopia</p>
                        </div>
                    </div>
                </div>
            </div>
            <!--end of 2 column-->
            <!-- form -->
            <div class="col-lg-6">
                <div class="container">
                    <div class="container mb-3">
                        <h2 class="display-5 fw-normal text-center">Send Feedback</h2>
                    </div>

                    <form action="" method="post">
                        <div class="mb-3">
                            <label for="feedbackUserName" class="form-label">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white" id="feedbackUserName">
                                    <i class="fa-solid fa-user"></i>
                                </span>
                                <input type="text" id="feedbackUserName" class="form-control" placeholder="John Adams">
                            </div>

                        </div>

                        <div class="mb-3">
                            <label for="feedbackUserEmail" class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white" id="feedbackUserEmail">
                                    <i class="fa-solid fa-envelope"></i>
                                </span>
                                <input type="email" id="feedbackUserEmail" class="form-control"
                                    placeholder="example@example.com">
                            </div>

                        </div>

                        <div class="mb-3">
                            <label for="feedbackUserNo" class="form-label">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white" id="feedbackUserNo">
                                    <i class="fa-solid fa-phone"></i>
                                </span>
                                <input type="tel" id="feedbackUserNo" class="form-control" placeholder="+251-">
                            </div>

                        </div>

                        <div class="mb-3">
                            <label for="feedbackUserComment" class="form-label">Message</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white" id="feedbackUserComment">
                                    <i class="fa-solid fa-comment"></i>
                                </span>
                                <textarea class="form-control" aria-label="feedbackUserComment"
                                    placeholder="write your comment here"></textarea>
                            </div>

                        </div>

                        <div class="container-fluid">
                            <button class="btn btn-secondary w-100" type="submit">Send</button>
                        </div>

                    </form>

                </div>
            </div>
        </div>

    </div>
</section>
{% endblock %}


</body>

</html>
